name: Run unit tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - pubspec.yaml

jobs:
  unit-test:
    permissions:
      contents: read
      pull-requests: write
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create env file
        run: |
          : > .env
          if [ -n "${{ secrets.ENV_VARS }}" ]; then
            echo -e "${{ secrets.ENV_VARS }}" | sed 's/\\n/\n/g' >> .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Report coverage
        id: coverage
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "coverage/lcov.info not found"
            exit 1
          fi

          COVERAGE_PERCENT="$(awk -F: '
            /^LF:/ { lf += $2 }
            /^LH:/ { lh += $2 }
            END {
              if (lf == 0) {
                print "0.00"
              } else {
                printf "%.2f", (lh / lf) * 100
              }
            }
          ' coverage/lcov.info)"

          echo "Coverage: ${COVERAGE_PERCENT}%"
          echo "coverage_percent=${COVERAGE_PERCENT}" >> "$GITHUB_OUTPUT"

      - name: Build coverage badge URL
        id: badge
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage_percent }}"
          COLOR="red"
          if awk "BEGIN {exit !($COVERAGE >= 85)}"; then
            COLOR="brightgreen"
          elif awk "BEGIN {exit !($COVERAGE >= 70)}"; then
            COLOR="yellow"
          elif awk "BEGIN {exit !($COVERAGE >= 50)}"; then
            COLOR="orange"
          fi
          BADGE_URL="https://img.shields.io/badge/Coverage-${COVERAGE}%25-${COLOR}"
          echo "badge_url=${BADGE_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment coverage on pull request
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: unit-test-coverage
          message: |
            ## Unit Test Coverage
            ![Coverage](${{ steps.badge.outputs.badge_url }})

            Total coverage: `${{ steps.coverage.outputs.coverage_percent }}%`

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: coverage/lcov.info
