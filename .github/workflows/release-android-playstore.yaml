name: Release Android app
on:
  workflow_dispatch:
    inputs:
      version:
        description: Build version (eg 0.30.0)
        required: false
      build_number:
        description: Build number (optional, auto-detected if not provided)
        required: false
      message:
        description: Change logs
        required: false
jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set env
        run: |
          echo "SIGNATURE_HASH=${{ secrets.SIGNATURE_HASH }}" >> $GITHUB_ENV
          echo "SIGNATURE_HASH_INHOUSE=${{ secrets.SIGNATURE_HASH_INHOUSE }}" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Fetch latest build number from Google Play Store
        id: fetch_build_number
        run: |
          REQUESTED_VERSION="${{ inputs.version }}"
          MANUAL_BUILD_NUMBER="${{ inputs.build_number }}"
          SERVICE_ACCOUNT_FILE="$(mktemp)"
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}' > "$SERVICE_ACCOUNT_FILE"

          if [ -n "$MANUAL_BUILD_NUMBER" ]; then
            # Use manually provided build number
            BUILD_NUMBER="$MANUAL_BUILD_NUMBER"
            echo "Using manually provided build number: $BUILD_NUMBER"
          else
            # Auto-detect from Google Play
            RESULT="$(bash scripts/fetch_latest_play_build.sh "$SERVICE_ACCOUNT_FILE" com.feralfile.app "$REQUESTED_VERSION")"
            LATEST_BUILD="$(printf '%s\n' "$RESULT" | sed -n 's/^latest_build_number=//p' | head -n 1)"
            LATEST_VERSION="$(printf '%s\n' "$RESULT" | sed -n 's/^latest_version=//p' | head -n 1)"

            if [ -z "$REQUESTED_VERSION" ]; then
              REQUESTED_VERSION="$LATEST_VERSION"
            fi

            if [ -z "$REQUESTED_VERSION" ] || [ "$REQUESTED_VERSION" = "0" ]; then
              echo "Failed to resolve Android version from Google Play. Pass the version input explicitly."
              rm -f "$SERVICE_ACCOUNT_FILE"
              exit 1
            fi

            if [ -z "$LATEST_BUILD" ]; then
              echo "Failed to parse latest_build_number from script output:"
              echo "$RESULT"
              rm -f "$SERVICE_ACCOUNT_FILE"
              exit 1
            fi

            BUILD_NUMBER=$((LATEST_BUILD + 1))
          fi

          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest Android version: $REQUESTED_VERSION, new build: $BUILD_NUMBER"

          rm -f "$SERVICE_ACCOUNT_FILE"

      - name: Set build number env
        run: |
          echo "FLUTTER_VERSION_NAME=${{ steps.fetch_build_number.outputs.version_name }}" >> $GITHUB_ENV
          echo "FLUTTER_VERSION_CODE=${{ steps.fetch_build_number.outputs.build_number }}" >> $GITHUB_ENV
          echo "NAME_SUFFIX=main-${{ steps.fetch_build_number.outputs.build_number }}" >> $GITHUB_ENV

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.KEY_VAULT_DEPLOYMENT_KEY }}

      - name: Add GitHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_VARS }}
          EOF
          echo "✓ .env file created"
          echo "=== .env content ==="
          cat .env
          echo "=== .env stats ==="
          echo "Size: $(wc -c < .env) bytes"
          echo "Lines: $(wc -l < .env) lines"

      - run: flutter pub cache repair
      - run: flutter pub get

      - name: Clone the Key Vault
        run: |
          git clone git@github.com:bitmark-inc/mobile-signing-key-vault.git --depth 1
          cp mobile-signing-key-vault/android/bitmark-autonomy/release.keystore android/release.keystore
          cp mobile-signing-key-vault/android/bitmark-autonomy/release.properties android/release.properties
          # Keep a root pointer for any scripts/checks that resolve from repo root.
          ln -sf android/release.keystore release.keystore

      - name: Build appbundle
        run: flutter build appbundle --flavor production --release --build-name "${{ env.FLUTTER_VERSION_NAME }}" --build-number "${{ env.FLUTTER_VERSION_CODE }}"

      - name: Release notes
        run: |
          mkdir whatsnew
          echo "${{ inputs.message }}" > ./whatsnew/whatsnew-en-US

      # Upload AAB to Google Play Internal Testing track
      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.feralfile.app
          releaseFiles: build/app/outputs/bundle/productionRelease/app-production-release.aab
          track: internal
          mappingFile: build/app/outputs/mapping/productionRelease/mapping.txt
          debugSymbols: build/app/intermediates/merged_native_libs/productionRelease/mergeProductionReleaseNativeLibs/out/lib
          whatsNewDirectory: ./whatsnew
