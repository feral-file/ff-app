name: Nightly integration tests

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use host Flutter/Android SDK
        run: |
          echo "FLUTTER_ROOT=/Users/ffci/flutter" >> "$GITHUB_ENV"
          echo "/Users/ffci/flutter/bin" >> "$GITHUB_PATH"
          echo "ANDROID_SDK_ROOT=/Users/ffci/.android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=/Users/ffci/.android/sdk" >> "$GITHUB_ENV"
          echo "/Users/ffci/.android/sdk/platform-tools" >> "$GITHUB_PATH"
          echo "/Users/ffci/.android/sdk/emulator" >> "$GITHUB_PATH"
          echo "/Users/ffci/.android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Provision .env for integration tests
        run: |
          : > .env
          if [ -n "${{ secrets.ENV_VARS }}" ]; then
            echo -e "${{ secrets.ENV_VARS }}" | sed 's/\\n/\n/g' >> .env
          fi

          TOPIC_FROM_SECRET="${{ secrets.FF1_TEST_TOPIC_ID }}"
          TOPIC_ID="${TOPIC_FROM_SECRET}"

          {
            if [ -n "${TOPIC_ID}" ]; then
              echo "FF1_TEST_TOPIC_ID=${TOPIC_ID}"
            fi
            if [ -n "${{ secrets.FF1_TEST_USER_ID }}" ]; then
              echo "FF1_TEST_USER_ID=${{ secrets.FF1_TEST_USER_ID }}"
            fi
          } >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration --concurrency=1

      - name: Notify failure via GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "nightly-integration-failure";
            const title = "Nightly integration tests failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "Nightly integration test workflow failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Branch: ${context.ref}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              "",
              "Please check the workflow logs and fix any failing integration scenario."
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 20
            });

            if (openIssues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssues[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label]
              });
            }
