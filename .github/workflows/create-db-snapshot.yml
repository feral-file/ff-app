name: Create DB Snapshot

on:
  workflow_dispatch:
    inputs:
      threads:
        description: Worker threads
        required: false
        type: string
        default: '8'
      channels_source:
        description: Curated channel source (URL or file path)
        required: false
        type: string
        default: 'https://feed.feralfile.com/api/v1/registry/channels'
      feed_endpoint:
        description: Optional feed endpoint origin to ingest all channels
        required: false
        type: string
        default: ''
      required_channel_ids:
        description: Comma-separated channel IDs to require in snapshot
        required: false
        type: string
        default: ''
      dryrun:
        description: Dry run mode (skip S3 upload, artifact only)
        required: false
        type: boolean
        default: false

jobs:
  snapshot:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Verify sqlite3
        run: sqlite3 -version

      - name: Verify sqlite3 FTS5
        run: |
          set -euo pipefail
          sqlite3 :memory: <<'SQL'
          CREATE VIRTUAL TABLE fts5_probe USING fts5(content);
          DROP TABLE fts5_probe;
          SQL

      - name: Build snapshot sqlite
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.DB_SNAPSHOT_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.DB_SNAPSHOT_S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.DB_SNAPSHOT_S3_ENDPOINT }}
        run: |
          set -euo pipefail

          args=("--threads" "${{ inputs.threads }}")

          if [[ -n "${{ inputs.feed_endpoint }}" ]]; then
            args+=("--channels-feed-endpoint" "${{ inputs.feed_endpoint }}")
          elif [[ -n "${{ inputs.channels_source }}" ]]; then
            args+=("--channels-source" "${{ inputs.channels_source }}")
          else
            echo "Either channels_source or feed_endpoint is required" >&2
            exit 1
          fi

          if [[ -n "${{ inputs.required_channel_ids }}" ]]; then
            IFS=',' read -ra required_ids <<< "${{ inputs.required_channel_ids }}"
            for channel_id in "${required_ids[@]}"; do
              trimmed="$(echo "$channel_id" | xargs)"
              if [[ -n "$trimmed" ]]; then
                args+=("--require-channel-id" "$trimmed")
              fi
            done
          fi

          if [[ "${{ inputs.dryrun }}" == "true" ]]; then
            args+=("--dryrun")
          fi

          node scripts/build_feed_indexer_sqlite.js "${args[@]}"

      - name: Write snapshot workflow summary
        run: |
          set -euo pipefail

          db_path="scripts/ff_feed_indexer_seed.sqlite"
          generated_at="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          publisher_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM publishers;")"
          channel_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM channels;")"
          playlist_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM playlists;")"
          item_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM items;")"
          playlist_item_total="$(sqlite3 "$db_path" "SELECT COALESCE(SUM(item_count), 0) FROM playlists;")"

          {
            echo "## DB Snapshot Summary"
            echo ""
            echo "- Generated at: ${generated_at}"
            echo "- Publishers: ${publisher_count}"
            echo "- Channels: ${channel_count}"
            echo "- Playlists: ${playlist_count}"
            echo "- Items: ${item_count}"
            echo "- Total playlist items: ${playlist_item_total}"
            echo ""
            echo "### Playlists by Publisher and Channel"
            echo ""
            echo "| Publisher | Channel | Playlist | Items |"
            echo "|---|---|---|---:|"
            sqlite3 -noheader "$db_path" "
              SELECT
                '| ' ||
                REPLACE(COALESCE(p.title, '(unknown publisher)'), '|', '\\|') || ' | ' ||
                REPLACE(COALESCE(c.title, '(unknown channel)'), '|', '\\|') || ' | ' ||
                REPLACE(COALESCE(pl.title, '(untitled playlist)'), '|', '\\|') || ' | ' ||
                COALESCE(pl.item_count, 0) || ' |'
              FROM playlists pl
              LEFT JOIN channels c ON c.id = pl.channel_id
              LEFT JOIN publishers p ON p.id = c.publisher_id
              ORDER BY
                COALESCE(c.publisher_id, 2147483647) ASC,
                pl.created_at_us DESC,
                pl.id ASC;
            "
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload local artifact
        uses: actions/upload-artifact@v4
        with:
          name: ff-feed-indexer-sqlite
          path: scripts/ff_feed_indexer_seed.sqlite
          if-no-files-found: error
