name: Create DB Snapshot

on:
  workflow_dispatch:
    inputs:
      threads:
        description: Worker threads
        required: false
        type: string
        default: '4'
      s3_object_key:
        description: S3 object key (empty = ff_feed_indexer_seed.sqlite)
        required: false
        type: string

jobs:
  snapshot:
    runs-on: self-hosted
    steps:
      - uses: actions/setup-node@v6
        with:
          package-manager-cache: false

      - name: Verify sqlite3
        run: sqlite3 -version

      - name: Build snapshot sqlite
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.DB_SNAPSHOT_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.DB_SNAPSHOT_S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.DB_SNAPSHOT_S3_ENDPOINT }}
        run: |
          set -euo pipefail

          args=("--out" "scripts/ff_feed_indexer_seed.sqlite" "--threads" "${{ inputs.threads }}")

          if [ -n "${{ inputs.s3_object_key }}" ]; then
            args+=("--s3-object-key" "${{ inputs.s3_object_key }}")
          fi

          node scripts/build_feed_indexer_sqlite.js "${args[@]}"

      - name: Write snapshot workflow summary
        run: |
          set -euo pipefail

          db_path="scripts/ff_feed_indexer_seed.sqlite"
          generated_at="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          publisher_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM publishers;")"
          channel_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM channels;")"
          playlist_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM playlists;")"
          item_count="$(sqlite3 "$db_path" "SELECT COUNT(*) FROM items;")"
          playlist_item_total="$(sqlite3 "$db_path" "SELECT COALESCE(SUM(item_count), 0) FROM playlists;")"

          {
            echo "## DB Snapshot Summary"
            echo ""
            echo "- Generated at: ${generated_at}"
            echo "- Publishers: ${publisher_count}"
            echo "- Channels: ${channel_count}"
            echo "- Playlists: ${playlist_count}"
            echo "- Items: ${item_count}"
            echo "- Total playlist items: ${playlist_item_total}"
            echo ""
            echo "### Playlists by Publisher and Channel"
            echo ""
            echo "| Publisher | Channel | Playlist | Items |"
            echo "|---|---|---|---:|"
            sqlite3 -noheader "$db_path" "
              SELECT
                '| ' ||
                REPLACE(COALESCE(p.title, '(unknown publisher)'), '|', '\\|') || ' | ' ||
                REPLACE(COALESCE(c.title, '(unknown channel)'), '|', '\\|') || ' | ' ||
                REPLACE(COALESCE(pl.title, '(untitled playlist)'), '|', '\\|') || ' | ' ||
                COALESCE(pl.item_count, 0) || ' |'
              FROM playlists pl
              LEFT JOIN channels c ON c.id = pl.channel_id
              LEFT JOIN publishers p ON p.id = c.publisher_id
              ORDER BY
                LOWER(COALESCE(p.title, '')),
                LOWER(COALESCE(c.title, '')),
                LOWER(COALESCE(pl.title, ''));
            "
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload local artifact
        uses: actions/upload-artifact@v4
        with:
          name: ff-feed-indexer-sqlite
          path: scripts/ff_feed_indexer_seed.sqlite
          if-no-files-found: error
