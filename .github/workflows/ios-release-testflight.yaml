name: Deploy the iOS app for TestFlight
on:
  push:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version'
        required: true
      build-number:
        description: 'Build number (CFBundleVersion). Defaults to GitHub run number if omitted.'
        required: false
      message:
        description: Change logs
        required: false

jobs:
  build-upload:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Flutter.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2' #latest-stable

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.KEY_VAULT_DEPLOYMENT_KEY }}

      - name: Add GitHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts

      - name: Create env file
        run: |
          touch .env
          echo -e "${{ secrets.ENV_VARS }}" | sed 's/\\n/\n/g' >> .env
          cat .env

      - run: flutter pub get

      - name: Cache pods
        id: cache-pods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        run: |
          cd ios/
          pod install --repo-update

      - name: Resolve existing App Store provisioning profile
        run: |
          BUNDLE_ID="com.feralfile.app"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          if [[ ! -d "$PROFILE_DIR" ]]; then
            echo "Provisioning profile directory not found: $PROFILE_DIR"
            exit 1
          fi

          PROFILE_NAME=""
          PROFILE_UUID=""
          TEAM_ID=""

          shopt -s nullglob
          for profile in "$PROFILE_DIR"/*.mobileprovision; do
            tmp_plist="$(mktemp)"
            if ! security cms -D -i "$profile" > "$tmp_plist" 2>/dev/null; then
              rm -f "$tmp_plist"
              continue
            fi

            app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$tmp_plist" 2>/dev/null || true)"
            get_task_allow="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$tmp_plist" 2>/dev/null || true)"
            first_device="$(/usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$tmp_plist" 2>/dev/null || true)"

            if [[ "$app_id" == *".${BUNDLE_ID}" ]] && [[ "$get_task_allow" == "false" ]] && [[ -z "$first_device" ]]; then
              PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$tmp_plist" 2>/dev/null || true)"
              PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$tmp_plist" 2>/dev/null || true)"
              TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$tmp_plist" 2>/dev/null || true)"
              rm -f "$tmp_plist"
              break
            fi
            rm -f "$tmp_plist"
          done
          shopt -u nullglob

          if [[ -z "$PROFILE_NAME" || -z "$PROFILE_UUID" || -z "$TEAM_ID" ]]; then
            echo "No matching App Store profile found for ${BUNDLE_ID} in ${PROFILE_DIR}"
            exit 1
          fi

          echo "Using provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Using team: $TEAM_ID"

          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "DEVELOPMENT_TEAM=$TEAM_ID" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          BUILD_NAME="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs['build-number'] }}"
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER='${{ github.run_number }}'
          fi

          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            FLUTTER_BUILD_NAME="$BUILD_NAME" \
            FLUTTER_BUILD_NUMBER="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          IPA_PATH="$(ls "$EXPORT_PATH"/*.ipa | head -1)"
          echo "IOS_IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IOS_IPA_PATH }}
          issuer-id: ${{ secrets.FF_TESTFLIGHT_ISSUER_ID }}
          api-key-id: ${{ secrets.FF_TESTFLIGHT_KEY_ID }}
          api-private-key: ${{ secrets.FF_TESTFLIGHT_API_TOKEN }}
