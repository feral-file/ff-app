name: Release iOS app
on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version"
        required: false
      build-number:
        description: "Build number (CFBundleVersion). Defaults to latest TestFlight build + 1 if omitted."
        required: false
      message:
        description: Change logs
        required: false
  release:
    types:
      - published

jobs:
  build-upload:
    runs-on: [self-hosted, macOS]
    env:
      IOS_P12_PATH: mobile-signing-key-vault/ios/feralfile/appstore/Certificates.p12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Flutter.
      - name: Use host Flutter/Android SDK
        run: |
          echo "FLUTTER_ROOT=/Users/ffci/flutter" >> "$GITHUB_ENV"
          echo "/Users/ffci/flutter/bin" >> "$GITHUB_PATH"
          echo "ANDROID_SDK_ROOT=/Users/ffci/.android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=/Users/ffci/.android/sdk" >> "$GITHUB_ENV"
          echo "/Users/ffci/.android/sdk/platform-tools" >> "$GITHUB_PATH"
          echo "/Users/ffci/.android/sdk/emulator" >> "$GITHUB_PATH"
          echo "/Users/ffci/.android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.KEY_VAULT_DEPLOYMENT_KEY }}

      - name: Add GitHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_VARS }}
          EOF
          echo "✓ .env file created"
          echo "=== .env content ==="
          cat .env
          echo "=== .env stats ==="
          echo "Size: $(wc -c < .env) bytes"
          echo "Lines: $(wc -l < .env) lines"

      - run: flutter pub get

      - name: Resolve release version from tag
        id: release_meta
        run: |
          VERSION_VALUE=""
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION_VALUE="${GITHUB_REF_NAME}"
            if [[ -z "$VERSION_VALUE" ]]; then
              echo "Missing tag name in GITHUB_REF_NAME for release event"
              exit 1
            fi
          else
            VERSION_VALUE="${{ inputs.version }}"
          fi
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "Resolved iOS release version: ${VERSION_VALUE:-<auto>}"

      - name: Cache pods
        id: cache-pods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        run: |
          cd ios/
          pod install --repo-update

      - name: Clone signing vault (private repo)
        run: |
          git clone git@github.com:bitmark-inc/mobile-signing-key-vault.git --depth 1

      - name: Get p12 base64 (from vault)
        id: p12
        run: |
          if [[ ! -f "$IOS_P12_PATH" ]]; then
            echo "Missing signing certificate at '$IOS_P12_PATH'. Ensure the signing vault is cloned."
            exit 1
          fi
          echo "base64<<CERT_EOF" >> "$GITHUB_OUTPUT"
          base64 -i "$IOS_P12_PATH" | tr -d '\n' >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"
          echo "CERT_EOF" >> "$GITHUB_OUTPUT"

      - name: Generate random keychain name
        id: keychain
        run: |
          KEYCHAIN_NAME="signing_temp_$(openssl rand -hex 4)"
          echo "name=$KEYCHAIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Import code signing certificates
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ steps.p12.outputs.base64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          keychain: ${{ steps.keychain.outputs.name }}
          create-keychain: true

      - name: Unlock keychain for security commands
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ steps.keychain.outputs.name }}.keychain-db"
          LOGIN_KEYCHAIN_PATH="$HOME/Library/Keychains/login.keychain-db"
          # Unlock keychain
          security unlock-keychain -p "${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          # Keep login keychain in search list so cert chain/intermediates can resolve.
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Download provisioning profiles
        id: profiles
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: "com.feralfile.app"
          profile-type: "IOS_APP_STORE"
          issuer-id: ${{ secrets.FF_TESTFLIGHT_ISSUER_ID }}
          api-key-id: ${{ secrets.FF_TESTFLIGHT_KEY_ID }}
          api-private-key: ${{ secrets.FF_TESTFLIGHT_API_TOKEN }}

      - name: Extract provisioning profile metadata
        run: |
          PROFILES='${{ steps.profiles.outputs.profiles }}'

          if [[ -z "$PROFILES" ]]; then
            echo "No provisioning profiles downloaded"
            exit 1
          fi

          # Extract profile UDID
          PROFILE_UUID=$(echo "$PROFILES" | jq -r '.[0].udid // empty')
          PROFILE_NAME=$(echo "$PROFILES" | jq -r '.[0].name // .[0].profileName // .[0].attributes.name // empty')
          echo "DEBUG: PROFILE_UUID=$PROFILE_UUID"
          echo "DEBUG: PROFILE_NAME=$PROFILE_NAME"

          if [[ -z "$PROFILE_NAME" ]]; then
            echo "Unable to resolve provisioning profile name from downloaded profiles output"
            exit 1
          fi

          # Store profile data for explicit manual export signing.
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "BUNDLE_ID=com.feralfile.app" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          BUILD_NAME="${{ steps.release_meta.outputs.version }}"
          BUILD_NUMBER="${{ github.event_name == 'workflow_dispatch' && inputs['build-number'] || '' }}"
          if [[ -z "$BUILD_NAME" || -z "$BUILD_NUMBER" ]]; then
            ASC_API_KEY_FILE="$(mktemp)"
            printf '%s' "${{ secrets.FF_TESTFLIGHT_API_TOKEN }}" > "$ASC_API_KEY_FILE"

            RESULT="$(bash scripts/fetch_latest_testflight_build.sh \
              com.feralfile.app \
              "$BUILD_NAME" \
              "${{ secrets.FF_TESTFLIGHT_ISSUER_ID }}" \
              "${{ secrets.FF_TESTFLIGHT_KEY_ID }}" \
              "$ASC_API_KEY_FILE")"
            LATEST_VERSION="$(printf '%s\n' "$RESULT" | sed -n 's/^latest_version=//p' | head -n 1)"
            LATEST_BUILD="$(printf '%s\n' "$RESULT" | sed -n 's/^latest_build_number=//p' | head -n 1)"
            rm -f "$ASC_API_KEY_FILE"

            if [[ -z "$LATEST_VERSION" || -z "$LATEST_BUILD" ]]; then
              echo "Failed to parse latest_version/latest_build_number from script output:"
              echo "$RESULT"
              exit 1
            fi

            if [[ -z "$BUILD_NAME" ]]; then
              BUILD_NAME="$LATEST_VERSION"
            fi
            if [[ -z "$BUILD_NAME" || "$BUILD_NAME" == "0" ]]; then
              echo "Failed to resolve iOS version from TestFlight. Pass the version input explicitly."
              exit 1
            fi

            if [[ -z "$BUILD_NUMBER" ]]; then
              BUILD_NUMBER=$((LATEST_BUILD + 1))
            fi

            echo "Latest iOS version: $LATEST_VERSION, latest build: $LATEST_BUILD"
          fi

          echo "Using iOS version: $BUILD_NAME"
          echo "Using iOS build number: $BUILD_NUMBER"
          echo "IOS_BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"
          # Don't specify DEVELOPMENT_TEAM, CODE_SIGN_STYLE, or PROVISIONING_PROFILE
          # Let xcodebuild automatically discover and use the downloaded provisioning profiles
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            FLUTTER_BUILD_NAME="$BUILD_NAME" \
            FLUTTER_BUILD_NUMBER="$BUILD_NUMBER" \
            archive

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"
          echo "SENTRY_RELEASE=com.feralfile.app@$BUILD_NAME+$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "SENTRY_DIST=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>X7SR8Q33RS</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.feralfile.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          IPA_PATH="$(ls "$EXPORT_PATH"/*.ipa | head -1)"
          echo "IOS_IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Create Sentry release and upload iOS debug symbols
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          echo "Sentry release: $SENTRY_RELEASE"
          sentry-cli releases --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" new "$SENTRY_RELEASE" || \
            sentry-cli releases --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" info "$SENTRY_RELEASE"
          sentry-cli releases --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" set-commits "$SENTRY_RELEASE" --auto || true
          SYMBOL_UPLOAD_ARGS=(--include-sources --wait --type dsym)
          if [[ -d "$ARCHIVE_PATH/BCSymbolMaps" ]]; then
            SYMBOL_UPLOAD_ARGS+=(--symbol-maps "$ARCHIVE_PATH/BCSymbolMaps")
          fi
          sentry-cli debug-files upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
            "${SYMBOL_UPLOAD_ARGS[@]}" \
            "$ARCHIVE_PATH/dSYMs"
          sentry-cli releases --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" finalize "$SENTRY_RELEASE"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IOS_IPA_PATH }}
          app-type: ios
          issuer-id: ${{ secrets.FF_TESTFLIGHT_ISSUER_ID }}
          api-key-id: ${{ secrets.FF_TESTFLIGHT_KEY_ID }}
          api-private-key: ${{ secrets.FF_TESTFLIGHT_API_TOKEN }}

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ steps.keychain.outputs.name }}.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "${{ steps.keychain.outputs.name }}.keychain"
          fi
