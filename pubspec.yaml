name: app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  # Core framework and utilities
  flutter:
    sdk: flutter
  collection: 1.19.1
  logging: 1.3.0
  meta: ^1.17.0
  path: ^1.9.0
  synchronized: 3.4.0

  # App flow and state management
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  riverpod: any
  rxdart: ^0.28.0

  # Networking and APIs
  app_links: 7.0.0
  dio: ^5.9.2
  graphql: ^5.2.3
  http: 1.6.0
  url_launcher: 6.3.2
  web_socket_channel: ^3.0.3

  # SQLite database
  drift: ^2.32.0
  sqlite3: ^3.1.6
  sqlite3_flutter_libs: ^0.6.0+eol

  # Local database and persistence
  hive_flutter: 1.1.0
  objectbox: ^5.2.0
  objectbox_flutter_libs: ^5.2.0
  path_provider: 2.1.5

  # Security and identifiers
  crypto: 3.0.7
  fast_base58: ^0.2.1
  uuid:
  wallet: ^0.0.18

  # Observability
  sentry: 9.14.0
  sentry_dio: 9.14.0
  sentry_drift: 9.14.0
  sentry_flutter: 9.14.0
  sentry_link: 9.14.0
  sentry_logging: 9.14.0

  # UI, widgets, and rendering
  after_layout: ^1.2.0
  backdrop: 0.9.1
  cached_network_image: 3.4.1
  fl_chart: 1.1.1
  flutter_markdown: 0.7.7+1
  flutter_svg: 2.2.3
  flutter_widget_from_html: 0.17.1
  roundcheckbox: 2.0.5
  shimmer: 3.0.0

  # Media
  audio_session: ^0.2.2
  flutter_pdfview: 1.4.4
  gif_view: 1.0.3
  just_audio: ^0.10.4
  video_player: ^2.11.0

  # Device and platform integrations
  device_info_plus: 12.3.0
  flutter_blue_plus: ^2.2.1
  flutter_dotenv: ^6.0.0
  flutter_email_sender: 8.0.0
  flutter_keyboard_visibility: 6.0.0
  jiffy: 6.4.4
  mobile_scanner:
  package_info_plus: 9.0.0
  permission_handler: 12.0.1
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.23.8
dev_dependencies:
  # Code generation
  build_runner: ^2.12.2
  drift_dev: ^2.30.0
  objectbox_generator: ^5.2.0

  # Testing
  flutter_test:
    sdk: flutter

  # Linting and analysis
  flutter_lints: 6.0.0
  very_good_analysis: ^10.2.0

  # Platform interfaces
  path_provider_platform_interface: any
dependency_overrides:
  path_provider_foundation: 2.6.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Custom fonts for the application
  fonts:
    - family: PP Mori
      fonts:
        - asset: assets/fonts/PPMori/PPMori-Regular.ttf
        - asset: assets/fonts/PPMori/PPMori-Bold.ttf
          weight: 700
        - asset: assets/fonts/PPMori/PPMori-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PPMori/PPMori-Medium.ttf
          weight: 500
        - asset: assets/fonts/PPMori/PPMori-Light.ttf
          weight: 300
        - asset: assets/fonts/PPMori/PPMori-Extralight.ttf
          weight: 200
        - asset: assets/fonts/PPMori/PPMori-RegularItalic.ttf
          style: italic
        - asset: assets/fonts/PPMori/PPMori-BoldItalic.ttf
          weight: 700
          style: italic

    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Italic.ttf
          style: italic
